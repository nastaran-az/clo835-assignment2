apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  labels:
    app: employees
spec:
  containers:
  - name: webapp
    image: 884775304728.dkr.ecr.us-east-1.amazonaws.com/clo835-webapp:1.0
    ports:
    - containerPort: 8080
    env:
    - name: DBHOST
      value: mysql-service.mysql.svc.cluster.local
    - name: DBPORT
      value: "3306"
    - name: DBUSER
      value: root
    - name: DBPWD
      value: password
